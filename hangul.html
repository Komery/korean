<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글 Master Pro</title>

<style>
:root{
--primary:#2c3e50;
--accent:#e67e22;
--bg:#f0f2f5;
--key-bg:#ffffff;
--selected-bg:#e67e22;
--translate-bg:#27ae60;
}

body{
font-family:'Segoe UI',Roboto,sans-serif;
background:var(--bg);
margin:0;
padding:15px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:500px;
background:white;
padding:20px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.display-unit{
background:#fff;
padding:25px 15px;
border-radius:20px;
text-align:center;
border:3px solid #eee;
margin-bottom:20px;
}

.sentence-display{
font-size:24px;
color:var(--primary);
min-height:30px;
margin-bottom:5px;
font-weight:700;
word-break:break-all;
}

.translation-display{
font-size:18px;
color:var(--translate-bg);
font-weight:600;
margin-bottom:15px;
min-height:22px;
}

.combined-text{
font-size:70px;
font-weight:900;
color:var(--primary);
margin:10px 0;
line-height:1;
}

.pron-main{
font-size:24px;
color:var(--accent);
font-weight:bold;
}

.button-group{
display:flex;
gap:8px;
justify-content:center;
margin-top:15px;
flex-wrap:wrap;
}

.btn{
padding:12px 10px;
border:none;
color:white;
font-size:13px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
flex:1;
}

.enter-btn{background:#2ecc71;}
.type-btn{background:#3498db;}
.speak-btn{background:#e67e22;}
.yg-btn{background:#e74c3c;}
.clear-btn{background:#c0392b;}
.rd-btn{background:#8e44ad;margin-top:10px;width:100%;}
.trans-link-btn{background:#4285F4;margin-top:5px;width:100%;}

.grid-label{
font-weight:bold;
margin:25px 0 10px 0;
color:var(--primary);
font-size:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(65px,1fr));
gap:10px;
}

.key{
padding:12px 0;
border:2px solid #f0f0f0;
border-radius:15px;
cursor:pointer;
background:var(--key-bg);
text-align:center;
}

.key span.k-char{
font-size:20px;
font-weight:700;
color:var(--primary);
display:block;
}

.key span.e-pron{
font-size:11px;
color:#aaa;
}

.key.selected{
background:var(--selected-bg);
border-color:var(--selected-bg);
}

.key.selected span{
color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="display-unit">

<div id="sentence-box" class="sentence-display">
Build your sentence...
</div>

<div id="translation-box" class="translation-display">
Translation will appear here
</div>

<div id="target-char" class="combined-text">-</div>
<div id="target-pron-main" class="pron-main">-</div>

<div class="button-group">
<button class="btn enter-btn" onclick="addToSentence()">➕ Enter</button>
<button class="btn type-btn" onclick="openTypingPrompt()">⌨️ Type Word</button>
</div>

<div class="button-group">
<button class="btn speak-btn" onclick="speak()">🔊 Read</button>
<button class="btn yg-btn" onclick="openYouGlish()">📺 YouGlish</button>
<button class="btn clear-btn" onclick="clearAll()">🗑️ Clear</button>
</div>

<button class="btn rd-btn" onclick="loadRandomWord()">
🎲 Get Random Study Word
</button>

</div>

<div class="grid-label">Initial Consonants</div>
<div id="init-grid" class="grid"></div>

<div class="grid-label">Vowels</div>
<div id="vow-grid" class="grid"></div>

<div class="grid-label">Batchim</div>
<div id="batch-grid" class="grid"></div>

</div>

<script>

const WORD_DB=[
{k:"학교",e:"School"},
{k:"사과",e:"Apple"},
{k:"고양이",e:"Cat"},
{k:"강아지",e:"Puppy"},
{k:"우유",e:"Milk"},
{k:"바나나",e:"Banana"},
{k:"친구",e:"Friend"},
{k:"사랑",e:"Love"},
{k:"하늘",e:"Sky"},
{k:"바다",e:"Sea"}
];

const CHO=["ㄱ","ㄴ","ㄷ","ㄹ","ㅁ","ㅂ","ㅅ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNG=["ㅏ","ㅑ","ㅓ","ㅕ","ㅗ","ㅛ","ㅜ","ㅠ","ㅡ","ㅣ"];
const JONG=["","ㄱ","ㄴ","ㄷ","ㄹ","ㅁ","ㅂ","ㅅ","ㅇ"];

let sInit=null;
let sVowel=null;
let sBatch=null;

let sentence="";

function renderGrid(id,data,callback){

const grid=document.getElementById(id);
grid.innerHTML="";

data.forEach(ch=>{
const btn=document.createElement("div");
btn.className="key";

btn.innerHTML=`<span class="k-char">${ch}</span>`;

btn.onclick=()=>{
grid.querySelectorAll(".key").forEach(k=>k.classList.remove("selected"));
btn.classList.add("selected");
callback(ch);
render();
};

grid.appendChild(btn);
});

}

function render(){

if(!sInit||!sVowel){
document.getElementById("target-char").innerText="-";
return;
}

const i=CHO.indexOf(sInit);
const v=JUNG.indexOf(sVowel);
const b=sBatch?JONG.indexOf(sBatch):0;

const code=(i*21+v)*28+b+44032;

const char=String.fromCharCode(code);

document.getElementById("target-char").innerText=char;

}

function addToSentence(){

const char=document.getElementById("target-char").innerText;

if(char==="-" )return;

sentence+=char;

updateSentenceUI();

}

function updateSentenceUI(){

const box=document.getElementById("sentence-box");
const transBox=document.getElementById("translation-box");

box.innerText=sentence||"Build your sentence...";

if(!sentence){
transBox.innerText="Translation will appear here";
return;
}

const match=WORD_DB.find(w=>w.k===sentence);

if(match){
transBox.innerText="Meaning: "+match.e;
return;
}

fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(sentence)}&langpair=ko|en`)
.then(res=>res.json())
.then(data=>{
transBox.innerText="Meaning: "+data.responseData.translatedText;
})
.catch(()=>{
transBox.innerText="(Translation unavailable)";
});

}

function loadRandomWord(){

const word=WORD_DB[Math.floor(Math.random()*WORD_DB.length)];

sentence=word.k;

updateSentenceUI();

}

function openTypingPrompt(){

const input=prompt("Type Korean word");

if(!input)return;

sentence=input;

updateSentenceUI();

}

function speak(){

const text=sentence;

if(!text)return;

const speech=new SpeechSynthesisUtterance(text);

speech.lang="ko-KR";

speech.rate=0.8;

speechSynthesis.speak(speech);

}

function openYouGlish(){

if(!sentence)return;

window.open(`https://youglish.com/pronounce/${sentence}/korean`);

}

function clearAll(){

sentence="";

updateSentenceUI();

}

renderGrid("init-grid",CHO,ch=>sInit=ch);
renderGrid("vow-grid",JUNG,ch=>sVowel=ch);
renderGrid("batch-grid",JONG,ch=>sBatch=ch);

</script>

</body>
</html>
