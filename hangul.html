<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한글 Master Pro</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --youglish: #e74c3c;
            --type-btn: #3498db;
            --random-btn: #8e44ad;
            --clear-btn: #c0392b;
            --bg: #f0f2f5;
            --key-bg: #ffffff;
            --selected-bg: #e67e22;
            --translate-bg: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 상단 디스플레이 영역: 시인성 대폭 강화 */
        .display-unit {
            background: #ffffff;
            padding: 25px 15px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid #eee;
            margin-bottom: 20px;
            position: sticky;
            top: 10px;
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .sentence-display {
            font-size: 26px;
            color: var(--primary);
            min-height: 32px;
            margin-bottom: 5px;
            font-weight: 800;
            word-break: break-all;
        }

        .translation-display {
            font-size: 18px;
            color: var(--translate-bg);
            font-weight: 600;
            margin-bottom: 15px;
            min-height: 22px;
        }

        .combined-text {
            font-size: 72px;
            font-weight: 900;
            color: var(--primary);
            margin: 10px 0;
            line-height: 1;
            text-shadow: 2px 2px 0px #eee;
        }

        .pron-main {
            font-size: 24px;
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .button-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 10px;
            border: none;
            color: white;
            font-size: 13px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .btn:active { transform: scale(0.95); }
        .enter-btn { background: #2ecc71; flex: 1.5; }
        .type-btn { background: var(--type-btn); }
        .speak-btn { background: var(--accent); }
        .yg-btn { background: var(--youglish); }
        .clear-btn { background: var(--clear-btn); }
        
        /* 랜덤 버튼 & 번역 링크 버튼 강조 */
        .rd-btn { 
            background: var(--random-btn); 
            padding: 16px; 
            font-size: 16px; 
            margin-top: 10px; 
            width: 100%; 
            border-radius: 15px;
            box-shadow: 0 4px 0 #703688;
        }
        .rd-btn:active { box-shadow: none; transform: translateY(4px); }
        
        .trans-link-btn { 
            background: #4285F4; 
            margin-top: 8px; 
            width: 100%; 
            font-size: 14px;
        }

        .grid-label {
            font-weight: bold;
            margin: 25px 0 10px 0;
            color: var(--primary);
            font-size: 15px;
            display: flex;
            align-items: center;
        }
        .grid-label::before {
            content: "";
            width: 4px;
            height: 16px;
            background: var(--accent);
            margin-right: 8px;
            border-radius: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px;
        }

        .key {
            padding: 12px 0;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            cursor: pointer;
            background: var(--key-bg);
            text-align: center;
            transition: 0.2s;
        }

        .key span.k-char { font-size: 20px; font-weight: 700; color: var(--primary); display: block; }
        .key span.e-pron { font-size: 11px; color: #aaa; text-transform: uppercase; }

        .key:hover { border-color: var(--accent); background: #fffaf5; }
        .key.selected { background: var(--selected-bg); border-color: var(--selected-bg); }
        .key.selected span.k-char, .key.selected span.e-pron { color: white; }

        .btn-reset {
            grid-column: 1 / -1;
            background: #eee;
            color: #666;
            font-size: 11px;
            margin-top: 8px;
            padding: 8px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="display-unit">
        <div id="sentence-box" class="sentence-display">Build your sentence...</div>
        <div id="translation-box" class="translation-display">Translation will appear here</div>
        <div id="target-char" class="combined-text">-</div>
        <div id="target-pron-main" class="pron-main">-</div>
        
        <div class="button-group">
            <button class="btn enter-btn" onclick="addToSentence()">➕ Enter</button>
            <button class="btn type-btn" onclick="openTypingPrompt()">⌨️ Type (Keyboard)</button>
        </div>
        <div class="button-group">
            <button class="btn speak-btn" onclick="speak()">🔊 Read</button>
            <button class="btn yg-btn" onclick="openYouGlish()">📺 YouGlish</button>
            <button class="btn clear-btn" onclick="clearAll()">🗑️ Clear All</button>
        </div>
        <button class="btn trans-link-btn" onclick="openGoogleTranslate()">🌐 Full Translation (Google)</button>
        <button class="btn rd-btn" onclick="loadRandomWord()">🎲 Get Random Study Word</button>
    </div>

    <div class="grid-label">1. 초성 (Initial Consonants)</div>
    <div id="init-grid" class="grid"></div>

    <div class="grid-label">2. 기본 모음 (Basic Vowels)</div>
    <div id="vow1-grid" class="grid"></div>
    
    <div class="grid-label">3. 쌍모음 (Double Vowels)</div>
    <div id="vow-double-grid" class="grid"></div>

    <div class="grid-label">4. 결합 모음 (Combined Vowels)</div>
    <div id="vow-combo-grid" class="grid"></div>
    <div class="btn-reset" onclick="resetVowels()">Clear Extra Vowels</div>

    <div class="grid-label">5. 기본 받침 (Basic Batchim)</div>
    <div id="batch-primary-grid" class="grid"></div>

    <div class="grid-label" style="font-size:11px; color:#7f8c8d;">Complex Batchim (Double/Mixed)</div>
    <div id="batch-advanced-grid" class="grid"></div>
    <div class="btn-reset" onclick="resetGrid('batch-')">No Batchim</div>
</div>

e:"Smile"},{k:"울다",e:"Cry"},{k:"기다리다",e:"Wait"},{k:"만나다",e:"Meet"},{k:"헤어지다",e:"Part ways"},{k:"생각하다",e:"Think"},{k:"기억하다",e:"Remember"},{k:"잊다",e:"Forget"},{k:"도와주다",e:"Help"},{k:"사용하다",e:"Use"},{k:"청소하다",e:"Clean"},{k:"요리하다",e:"Cook"},{k:"운동하다",e:"Work out"},{k:"운전하다",e:"Drive"},{k:"전화하다",e:"Call"},{k:"일하다",e:"Work"},{k:"쉬다",e:"Rest"},{k:"크다",e:"Big"},{k:"작다",e:"Small"},{k:"많다",e:"Many"},{k:"적다",e:"Few"},{k:"길다",e:"Long"},{k:"짧다",e:"Short"},{k:"높다",e:"High"},{k:"낮다",e:"Low"},{k:"넓다",e:"Wide"},{k:"좁다",e:"Narrow"},{k:"멀다",e:"Far"},{k:"가깝다",e:"Near"},{k:"빠르다",e:"Fast"},{k:"느리다",e:"Slow"},{k:"어렵다",e:"Difficult"},{k:"쉽다",e:"Easy"},{k:"무겁다",e:"Heavy"},{k:"가볍다",e:"Light"},{k:"뜨겁다",e:"Hot"},{k:"차갑다",e:"Cold"},{k:"시원하다",e:"Cool"},{k:"따뜻하다",e:"Warm"},{k:"좋다",e:"Good"},{k:"나쁘다",e:"Bad"},{k:"비싸다",e:"Expensive"},{k:"싸다",e:"Cheap"},{k:"맵다",e:"Spicy"},{k:"달다",e:"Sweet"},{k:"시다",e:"Sour"},{k:"쓰다",e:"Bitter"},{k:"짜다",e:"Salty"},{k:"맛있다",e:"Delicious"},{k:"맛없다",e:"Not tasty"},{k:"예쁘다",e:"Pretty"},{k:"멋있다",e:"Cool/Stylish"},{k:"귀엽다",e:"Cute"},{k:"무섭다",e:"Scary"},{k:"재미있다",e:"Funny/Fun"},{k:"재미없다",e:"Boring"},{k:"피곤하다",e:"Tired"},{k:"바쁘다",e:"Busy"},{k:"깨끗하다",e:"Clean"},{k:"더럽다",e:"Dirty"},{k:"조용하다",e:"Quiet"},{k:"시끄럽다",e:"Noisy"},{k:"똑똑하다",e:"Smart"},{k:"위험하다",e:"Dangerous"},{k:"안전하다",e:"Safe"},{k:"중요하다",e:"Important"},{k:"부지런하다",e:"Diligent"},{k:"친절하다",e:"Kind"},{k:"가능하다",e:"Possible"},{k:"불가능하다",e:"Impossible"}
];

const CHOSUNG=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNGSUNG=["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
const JONGSUNG=["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","ㄻ","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];

const inits=[{k:'ㄱ',e:'g'},{k:'ㄴ',e:'n'},{k:'ㄷ',e:'d'},{k:'ㄹ',e:'r'},{k:'ㅁ',e:'m'},{k:'ㅂ',e:'b'},{k:'ㅅ',e:'s'},{k:'ㅇ',e:'-'},{k:'ㅈ',e:'j'},{k:'ㅊ',e:'ch'},{k:'ㅋ',e:'k'},{k:'ㅌ',e:'t'},{k:'ㅍ',e:'p'},{k:'ㅎ',e:'h'},{k:'ㄲ',e:'kk'},{k:'ㄸ',e:'tt'},{k:'ㅃ',e:'pp'},{k:'ㅆ',e:'ss'},{k:'ㅉ',e:'jj'}];
const vows1=[{k:'ㅏ',e:'a'},{k:'ㅑ',e:'ya'},{k:'ㅓ',e:'eo'},{k:'ㅕ',e:'yeo'},{k:'ㅗ',e:'o'},{k:'ㅛ',e:'yo'},{k:'ㅜ',e:'u'},{k:'ㅠ',e:'yu'},{k:'ㅡ',e:'eu'},{k:'ㅣ',e:'i'}];
const vowDouble=[{k:'ㅐ',e:'ae'},{k:'ㅒ',e:'yae'},{k:'ㅔ',e:'e'},{k:'ㅖ',e:'ye'}];
const vowCombo=[{k:'ㅘ',e:'wa'},{k:'ㅙ',e:'wae'},{k:'ㅚ',e:'oe'},{k:'ㅝ',e:'wo'},{k:'ㅞ',e:'we'},{k:'ㅟ',e:'wi'},{k:'ㅢ',e:'ui'}];
const batchPrimary=[{k:'ㄱ',e:'k'},{k:'ㄴ',e:'n'},{k:'ㄷ',e:'t'},{k:'ㄹ',e:'l'},{k:'ㅁ',e:'m'},{k:'ㅂ',e:'p'},{k:'ㅅ',e:'t'},{k:'ㅇ',e:'ng'},{k:'ㅈ',e:'t'},{k:'ㅊ',e:'t'},{k:'ㅋ',e:'k'},{k:'ㅌ',e:'t'},{k:'ㅍ',e:'p'},{k:'ㅎ',e:'t'}];
const batchAdvanced=[{k:'ㄲ',e:'k'},{k:'ㅆ',e:'t'},{k:'ㄳ',e:'k'},{k:'ㄵ',e:'n'},{k:'ㄶ',e:'n'},{k:'ㄺ',e:'k'},{k:'ㄻ',e:'m'},{k:'ㄼ',e:'l'},{k:'ㄽ',e:'l'},{k:'ㄾ',e:'l'},{k:'ㄿ',e:'p'},{k:'ㅀ',e:'l'},{k:'ㅄ',e:'p'}];
const vowelMap={'ㅏㅣ':'ㅐ','ㅑㅣ':'ㅒ','ㅓㅣ':'ㅔ','ㅕㅣ':'ㅖ','ㅗㅏ':'ㅘ','ㅗㅐ':'ㅙ','ㅗㅣ':'ㅚ','ㅜㅓ':'ㅝ','ㅜㅔ':'ㅞ','ㅜㅣ':'ㅟ','ㅡㅣ':'ㅢ'};
const vPronMap={'ㅏ':'a','ㅐ':'ae','ㅑ':'ya','ㅒ':'yae','ㅓ':'eo','ㅔ':'e','ㅕ':'yeo','ㅖ':'ye','ㅗ':'o','ㅘ':'wa','ㅙ':'wae','ㅚ':'oe','ㅛ':'yo','ㅜ':'u','ㅝ':'wo','ㅞ':'we','ㅟ':'wi','ㅠ':'yu','ㅡ':'eu','ㅢ':'ui','ㅣ':'i'};

let sInit = null, sVow1 = null, sVowExtra = null, sBatch = null, sentence = "";

function init() {
    renderGrid("init-grid", inits, item => sInit = item);
    renderGrid("vow1-grid", vows1, item => sVow1 = item);
    renderGrid("vow-double-grid", vowDouble, item => sVowExtra = item);
    renderGrid("vow-combo-grid", vowCombo, item => sVowExtra = item);
    renderGrid("batch-primary-grid", batchPrimary, item => sBatch = item);
    renderGrid("batch-advanced-grid", batchAdvanced, item => sBatch = item);
}

function renderGrid(id, data, onSelect) {
    const grid = document.getElementById(id);
    grid.innerHTML = "";
    data.forEach(item => {
        const btn = document.createElement("div");
        btn.className = "key";
        btn.innerHTML = `<span class="k-char">${item.k}</span><span class="e-pron">${item.e}</span>`;
        btn.onclick = () => handleSelection(id, item, btn, onSelect);
        grid.appendChild(btn);
    });
}

function handleSelection(id, item, btn, onSelect) {
    const isAlreadySelected = btn.classList.contains("selected");
    
    if(id.includes("batch")) {
        document.querySelectorAll('[id^="batch-"] .key').forEach(k => k.classList.remove("selected"));
    } else if(id === "vow-double-grid" || id === "vow-combo-grid") {
        document.querySelectorAll('#vow-double-grid .key, #vow-combo-grid .key').forEach(k => k.classList.remove("selected"));
    } else {
        document.querySelectorAll(`#${id} .key`).forEach(k => k.classList.remove("selected"));
    }

    if (isAlreadySelected) {
        btn.classList.remove("selected");
        if(id === "init-grid") sInit = null;
        else if(id === "vow1-grid") sVow1 = null;
        else if(id === "vow-double-grid" || id === "vow-combo-grid") sVowExtra = null;
        else if(id.includes("batch")) sBatch = null;
    } else {
        btn.classList.add("selected");
        onSelect(item);
    }
    render();
}

function updateSentenceUI() {
    const box = document.getElementById("sentence-box");
    const transBox = document.getElementById("translation-box");
    
    box.innerText = sentence || "Build your sentence...";
    box.style.color = sentence ? "#2c3e50" : "#7f8c8d";
    
    // DB 매칭 확인 (가장 정확도가 높은 내부 검색)
    const match = WORD_DB.find(w => w.k === sentence);
    if (match) {
        transBox.innerText = `Meaning: ${match.e}`;
        transBox.style.color = "#27ae60";
    } else if (sentence.length > 0) {
        transBox.innerText = "Click '🌐 Full Translation' for accurate results!";
        transBox.style.color = "#3498db";
    } else {
        transBox.innerText = "Translation will appear here";
        transBox.style.color = "#7f8c8d";
    }
}

function openTypingPrompt() {
    // 요청하신 대로 팝업 문구 수정 (한글/영어 병기)
    const message = "연습하고 싶은 한글 단어나 문장을 입력하세요.\n(Please type a Korean word or sentence you want to practice.)";
    const input = prompt(message);
    if (input && input.trim() !== "") {
        sentence = input;
        updateSentenceUI();
        resetSelections();
    }
}

function loadRandomWord() {
    const word = WORD_DB[Math.floor(Math.random() * WORD_DB.length)];
    sentence = word.k;
    updateSentenceUI();
    // 랜덤 단어인 경우 뜻을 바로 크게 표시
    document.getElementById("translation-box").innerText = `Meaning: ${word.e}`;
    resetSelections();
}

function openGoogleTranslate() {
    if (!sentence || sentence === "") return;
    // 1번 방식: 구글 번역 페이지 딥링크 연동
    window.open(`https://translate.google.com/?sl=ko&tl=en&text=${encodeURIComponent(sentence)}&op=translate`, '_blank');
}

function addToSentence() {
    const char = document.getElementById("target-char").innerText;
    if (char === "-" || char === "") return;
    sentence += char;
    updateSentenceUI();
    resetSelections();
}

function clearAll() {
    if (sentence.length > 0 && confirm("문장을 모두 지우시겠습니까? (Clear all?)")) {
        sentence = "";
        updateSentenceUI();
        resetSelections();
    }
}

function resetVowels() {
    sVowExtra = null;
    document.querySelectorAll('#vow-double-grid .key, #vow-combo-grid .key').forEach(k => k.classList.remove("selected"));
    render();
}

function resetGrid(prefix) {
    if (prefix === 'batch-') {
        sBatch = null;
        document.querySelectorAll('[id^="batch-"] .key').forEach(k => k.classList.remove("selected"));
    }
    render();
}

function resetSelections() {
    sInit = sVow1 = sVowExtra = sBatch = null;
    document.querySelectorAll('.key').forEach(k => k.classList.remove("selected"));
    render();
}

function getFinalVowel() {
    if (!sVow1 && !sVowExtra) return { finalV: null };
    if (sVow1 && sVowExtra) {
        const combined = sVow1.k + sVowExtra.k;
        if (vowelMap[combined]) return { finalV: vowelMap[combined] };
    }
    return { finalV: sVowExtra ? sVowExtra.k : sVow1.k };
}

function render() {
    const targetChar = document.getElementById("target-char");
    const targetPron = document.getElementById("target-pron-main");
    const { finalV } = getFinalVowel();
    
    if (!sInit && !finalV) {
        targetChar.innerText = "-";
        targetPron.innerText = "-";
        return;
    }
    if (!sInit || !finalV) {
        targetChar.innerText = sInit ? sInit.k : finalV;
        const rawPron = sInit ? sInit.e : (vPronMap[finalV] || "");
        targetPron.innerText = rawPron.replace('-', '').toUpperCase() || "-";
        return;
    }
    const vIndex = JUNGSUNG.indexOf(finalV);
    const bIndex = sBatch ? JONGSUNG.indexOf(sBatch.k) : 0;
    const iIndex = CHOSUNG.indexOf(sInit.k);
    
    const charCode = (iIndex * 21 + vIndex) * 28 + bIndex + 0xAC00;
    const char = String.fromCharCode(charCode);
    const iP = sInit.e === '-' ? '' : sInit.e;
    const vP = vPronMap[finalV] || "";
    const bP = sBatch ? sBatch.e : "";
    
    targetChar.innerText = char;
    targetPron.innerText = (iP + vP + bP).toUpperCase();
}

function speak() {
    const textToRead = sentence || document.getElementById("target-char").innerText;
    if(textToRead === "-" || textToRead === "") return;
    window.speechSynthesis.cancel();
    const speech = new SpeechSynthesisUtterance(textToRead);
    speech.lang = "ko-KR";
    speech.rate = 0.8;
    window.speechSynthesis.speak(speech);
}

function openYouGlish() {
    const query = sentence || document.getElementById("target-char").innerText;
    if(query === "-" || query === "") return;
    window.open(`https://youglish.com/pronounce/${encodeURIComponent(query)}/korean`, '_blank');
}

init();
</script>
