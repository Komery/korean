<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Korean Study App</title>

<style>

body{
font-family:system-ui;
background:#f2f4f7;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{
max-width:520px;
width:100%;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.display{
background:#fafafa;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
}

.sentence{
font-size:24px;
font-weight:700;
min-height:30px;
}

.char{
font-size:70px;
font-weight:900;
margin:10px 0;
}

.roman{
color:#e67e22;
font-weight:700;
font-size:20px;
}

iframe{
width:100%;
height:120px;
border:none;
margin-top:10px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(60px,1fr));
gap:8px;
margin-bottom:15px;
}

.key{
background:white;
border:2px solid #eee;
padding:10px;
border-radius:10px;
text-align:center;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.key.selected{
background:#e67e22;
color:white;
border-color:#e67e22;
}

button{
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
font-weight:700;
margin:4px;
}

.green{background:#2ecc71;color:white}
.blue{background:#3498db;color:white}
.orange{background:#e67e22;color:white}
.red{background:#e74c3c;color:white}
.purple{background:#8e44ad;color:white}

</style>
</head>

<body>

<div class="container">

<div class="display">

<div id="sentence" class="sentence">
Build sentence...
</div>

<div id="char" class="char">-</div>

<div id="roman" class="roman">-</div>

<iframe id="transFrame"></iframe>

<button class="green" onclick="addChar()">Enter</button>
<button class="blue" onclick="typeWord()">Type</button>
<button class="orange" onclick="speak()">Speak</button>
<button class="purple" onclick="randomWord()">Random</button>
<button class="red" onclick="clearSentence()">Clear</button>

</div>

<h3>Initial</h3>
<div id="initGrid" class="grid"></div>

<h3>Vowel</h3>
<div id="vowelGrid" class="grid"></div>

<h3>Batchim</h3>
<div id="batchGrid" class="grid"></div>

</div>

<script>

const CHO=["ㄱ","ㄴ","ㄷ","ㄹ","ㅁ","ㅂ","ㅅ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
const JUNG=["ㅏ","ㅑ","ㅓ","ㅕ","ㅗ","ㅛ","ㅜ","ㅠ","ㅡ","ㅣ"];
const JONG=["","ㄱ","ㄴ","ㄷ","ㄹ","ㅁ","ㅂ","ㅅ","ㅇ"];

const ROMAN={
"ㄱ":"g","ㄴ":"n","ㄷ":"d","ㄹ":"r","ㅁ":"m","ㅂ":"b","ㅅ":"s","ㅇ":"",
"ㅈ":"j","ㅊ":"ch","ㅋ":"k","ㅌ":"t","ㅍ":"p","ㅎ":"h",
"ㅏ":"a","ㅑ":"ya","ㅓ":"eo","ㅕ":"yeo","ㅗ":"o","ㅛ":"yo","ㅜ":"u","ㅠ":"yu","ㅡ":"eu","ㅣ":"i"
}

const WORDS=[
"학교","사과","사랑","친구","고양이","강아지",
"행복","한국","미국","컴퓨터","음악","운동"
]

let sInit=null
let sVowel=null
let sBatch=null

let sentence=""

function createGrid(id,data,callback){

const grid=document.getElementById(id)

data.forEach(c=>{

const btn=document.createElement("div")

btn.className="key"

btn.innerText=c

btn.onclick=()=>{

grid.querySelectorAll(".key").forEach(k=>k.classList.remove("selected"))

btn.classList.add("selected")

callback(c)

render()

}

grid.appendChild(btn)

})

}

function render(){

if(!sInit||!sVowel){

document.getElementById("char").innerText="-"
document.getElementById("roman").innerText="-"
return

}

const i=CHO.indexOf(sInit)
const v=JUNG.indexOf(sVowel)
const b=sBatch?JONG.indexOf(sBatch):0

const code=(i*21+v)*28+b+44032

const char=String.fromCharCode(code)

document.getElementById("char").innerText=char

const roman=(ROMAN[sInit]||"")+(ROMAN[sVowel]||"")+(ROMAN[sBatch]||"")

document.getElementById("roman").innerText=roman

}

function addChar(){

const char=document.getElementById("char").innerText

if(char=="-")return

sentence+=char

updateSentence()

}

function updateSentence(){

const box=document.getElementById("sentence")

box.innerText=sentence||"Build sentence..."

const frame=document.getElementById("transFrame")

if(sentence){

frame.src=`https://translate.google.com/?sl=ko&tl=en&text=${encodeURIComponent(sentence)}&op=translate`

}

}

function typeWord(){

const t=prompt("Type Korean")

if(!t)return

sentence=t

updateSentence()

}

function speak(){

if(!sentence)return

const speech=new SpeechSynthesisUtterance(sentence)

speech.lang="ko-KR"

speech.rate=0.8

speechSynthesis.speak(speech)

}

function randomWord(){

sentence=WORDS[Math.floor(Math.random()*WORDS.length)]

updateSentence()

}

function clearSentence(){

sentence=""

updateSentence()

}

createGrid("initGrid",CHO,c=>sInit=c)
createGrid("vowelGrid",JUNG,c=>sVowel=c)
createGrid("batchGrid",JONG,c=>sBatch=c)

</script>

</body>
</html>
