        .container { background: white; width: 95%; max-width: 550px; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .intro-title { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 15px; }
        .guide-box { text-align: left; background: #f8f9fa; padding: 20px; border-radius: 15px; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.6; border: 1px solid #e9ecef; }
        .eng-desc { color: #636e72; font-style: italic; margin-bottom: 10px; display: block; border-left: 3px solid #b2bec3; padding-left: 10px; }
        .start-btn { width: 100%; padding: 20px; border: none; border-radius: 15px; background: var(--primary); color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #quiz-area { display: none; }
        .progress-container { height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; }
        #progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: #636e72; }
        .eng-word { font-size: 2.2rem; font-weight: 800; color: #2d3436; margin: 30px 0; min-height: 4rem; display: flex; align-items: center; justify-content: center; }
        .options { display: grid; gap: 10px; }
        .option-btn { background: white; border: 2px solid #dfe6e9; padding: 15px; border-radius: 12px; font-size: 1.15rem; cursor: pointer; text-align: left; }
        .option-btn.correct { background-color: var(--success); border-color: var(--success); color: white; }
        .option-btn.wrong { background-color: var(--error); border-color: var(--error); color: white; }
        .explanation { margin-top: 20px; padding: 20px; border-radius: 15px; background-color: #f1f2f6; border: 1px solid #dfe6e9; font-size: 1rem; display: none; text-align: left; line-height: 1.5; }
        #next-btn { margin-top: 15px; width: 100%; padding: 18px; border: none; border-radius: 15px; background: #2d3436; color: white; font-size: 1.1rem; display: none; cursor: pointer; }
    </style>
</head>

    let currentIdx = 0;
    let score = 0;
    let isAnswered = false;
    let shuffledQuiz = [];

    function startQuiz() {
        shuffledQuiz = [...vocabList].sort(() => Math.random() - 0.5);
        document.getElementById('intro-area').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        nextQuestion();
    }

    function nextQuestion() {
        if (currentIdx >= 200) {
            alert("Congratulations! You mastered Vol.2!\nFinal Score: " + score);
            location.reload();
            return;
        }
        isAnswered = false;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('explanation').style.display = 'none';
        
        const correct = shuffledQuiz[currentIdx];
        document.getElementById('eng-word').innerText = correct.eng;
        document.getElementById('count').innerText = currentIdx + 1;
        document.getElementById('progress-fill').style.width = ((currentIdx + 1) / 200 * 100) + "%";

        let choices = [correct];
        while (choices.length < 4) {
            let rand = vocabList[Math.floor(Math.random() * vocabList.length)];
            if (!choices.some(c => c.kor === rand.kor)) choices.push(rand);
        }
        choices.sort(() => Math.random() - 0.5);

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        choices.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = item.kor;
            btn.onclick = () => {
                if (isAnswered) return;
                isAnswered = true;
                const expDiv = document.getElementById('explanation');
                expDiv.style.display = 'block';

                if (item.kor === correct.kor) {
                    btn.classList.add('correct');
                    score += 5;
                    expDiv.innerHTML = `<b style="color:var(--success);">✔ Correct!</b><br><b>${item.kor}</b> = ${item.eng}<br><small>${item.desc}</small>`;
                } else {
                    btn.classList.add('wrong');
                    expDiv.innerHTML = `<b style="color:var(--error);">✘ Wrong!</b><br>You chose: <b>${item.kor}</b> (= ${item.eng})<br><br>The correct answer for "<b>${correct.eng}</b>" is <b>${correct.kor}</b>.`;
                    Array.from(optionsDiv.children).forEach(b => {
                        if (b.innerText === correct.kor) b.classList.add('correct');
                    });
                }
                document.getElementById('score').innerText = score;
                document.getElementById('next-btn').style.display = 'block';
                currentIdx++;
            };
            optionsDiv.appendChild(btn);
        });
    }
</script>
</body>
</html>
