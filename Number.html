<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Number Master</title>
    <style>
        :root { --primary: #e67e22; --success: #2ecc71; --danger: #e74c3c; --bg: #fdf6e3; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 10px; }
        
        .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 5px; font-size: 12px; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; background: #fff; transition: 0.3s; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .mode-switcher { margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 15px; display: flex; justify-content: space-around; }
        .mode-btn { border: none; background: none; cursor: pointer; font-weight: bold; color: #7f8c8d; padding: 5px; font-size: 13px; }
        .mode-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        .word-box { min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; background: #fff9f0; border-radius: 15px; }
        .word-display { font-size: 38px; font-weight: bold; color: #2c3e50; text-align: center; margin: 0; }
        .pron { color: #d35400; font-style: italic; font-size: 18px; margin-top: 5px; }
        
        input { width: 100%; padding: 15px; font-size: 18px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; text-align: center; margin-bottom: 15px; outline: none; }
        
        .nav-btns { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; font-size: 15px; }
        .btn-check { background: var(--success); flex: 1.5; }
        .btn-next { background: var(--primary); }
        
        #message { margin-top: 20px; padding: 15px; border-radius: 10px; font-weight: bold; min-height: 24px; text-align: center; font-size: 15px; }
        .correct { background: #d4edda; color: #155724; }
        .wrong { background: #f8d7da; color: #721c24; }
        .hint-text { font-size: 12px; color: #7f8c8d; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color: var(--primary);">🔢 Number Master</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="changeCategory('money')">💰 Money & Dates<br>(일, 이, 삼...)</button>
        <button class="tab-btn" onclick="changeCategory('counting')">🍎 Counting Items<br>(하나, 둘, 셋...)</button>
        <button class="tab-btn" onclick="changeCategory('clock')">🕒 Telling Time<br>(Mix! 시/분)</button>
        <button class="tab-btn" onclick="changeCategory('shopping')">🛍️ Shopping<br>(Phrases)</button>
    </div>

    <div class="mode-switcher">
        <button id="m-en-kr" class="mode-btn active" onclick="setMode('EN_TO_KR')">English → Korean</button>
        <button id="m-kr-en" class="mode-btn" onclick="setMode('KR_TO_EN')">Korean → English</button>
    </div>

    <div id="quiz-status" style="color: #95a5a6; font-size: 13px; margin-bottom: 10px;">Question 1 / 10</div>
    
    <div class="word-box">
        <p class="word-display" id="main-word"></p>
        <p class="pron" id="pron-text"></p>
    </div>

    <input type="text" id="answer-input" placeholder="Type here..." autocomplete="off">

    <div class="nav-btns">
        <button class="btn" style="background:#bdc3c7" onclick="prevWord()">Prev</button>
        <button class="btn btn-check" onclick="checkAnswer()">Check</button>
        <button class="btn btn-next" onclick="nextWord()">Next</button>
    </div>

    <div id="message"></div>
    <p class="hint-text" id="hint-area"></p>
</div>

<script>
    const allData = {
        money: [
            {kr:"일", en:"1", pron:"Il"}, {kr:"이", en:"2", pron:"I"}, {kr:"삼", en:"3", pron:"Sam"}, 
            {kr:"사", en:"4", pron:"Sa"}, {kr:"오", en:"5", pron:"O"}, {kr:"육", en:"6", pron:"Yuk"},
            {kr:"칠", en:"7", pron:"Chil"}, {kr:"팔", en:"8", pron:"Pal"}, {kr:"구", en:"9", pron:"Gu"},
            {kr:"십", en:"10", pron:"Sip"}, {kr:"백", en:"100", pron:"Baek"}, {kr:"천", en:"1,000", pron:"Cheon"},
            {kr:"만", en:"10,000", pron:"Man"}, {kr:"이만", en:"20,000", pron:"I-man"}, {kr:"삼만", en:"30,000", pron:"Sam-man"},
            {kr:"사만", en:"40,000", pron:"Sa-man"}, {kr:"오만", en:"50,000", pron:"O-man"}
        ],
        counting: [
            {kr:"하나", en:"1", pron:"Hana"}, {kr:"둘", en:"2", pron:"Dul"}, {kr:"셋", en:"3", pron:"Set"},
            {kr:"넷", en:"4", pron:"Net"}, {kr:"다섯", en:"5", pron:"Daseot"}, {kr:"여섯", en:"6", pron:"Yeoseot"},
            {kr:"일곱", en:"7", pron:"Ilgop"}, {kr:"여덟", en:"8", pron:"Yeodeol"}, {kr:"아홉", en:"9", pron:"Ahop"},
            {kr:"열", en:"10", pron:"Yeol"}, {kr:"스무", en:"20", pron:"Seumu"}
        ],
        clock: [
            {kr:"한 시", en:"1 o'clock", pron:"Han-si"}, {kr:"두 시", en:"2 o'clock", pron:"Du-si"}, 
            {kr:"세 시", en:"3 o'clock", pron:"Se-si"}, {kr:"네 시", en:"4 o'clock", pron:"Ne-si"},
            {kr:"십 분", en:"10 minutes", pron:"Sip-bun"}, {kr:"이십 분", en:"20 minutes", pron:"Isip-bun"},
            {kr:"삼십 분", en:["30 minutes", "half"], pron:"Samsip-bun"},
            {kr:"한 시 삼십 분", en:"1:30", pron:"Han-si Samsip-bun"}
        ],
        shopping: [
            {kr:"원", en:"Won (Currency)", pron:"Won"}, {kr:"얼마예요", en:"How much?", pron:"Olmayeyo"},
            {kr:"이거 주세요", en:"Give me this one", pron:"Igeo juseyo"},
            {kr:"비싸요", en:"It's expensive", pron:"Bissayo"},
            {kr:"깎아주세요", en:["Discount please", "Make it cheaper"], pron:"Kkakkajuseyo"},
            {kr:"영수증 주세요", en:"Receipt please", pron:"Yeongsujeung juseyo"}
        ]
    };

    let currentCat = 'money';
    let currentIndex = 0;
    let currentMode = 'EN_TO_KR';

    function displayWord() {
        const data = allData[currentCat][currentIndex];
        const display = document.getElementById('main-word');
        const pron = document.getElementById('pron-text');
        const input = document.getElementById('answer-input');
        const hint = document.getElementById('hint-area');
        
        if(currentMode === 'EN_TO_KR') {
            const engText = Array.isArray(data.en) ? data.en[0] : data.en;
            display.innerText = engText;
            pron.innerText = "";
            input.placeholder = "Type in Korean...";
        } else {
            const korText = Array.isArray(data.kr) ? data.kr[0] : data.kr;
            display.innerText = korText;
            pron.innerText = `(${data.pron})`;
            input.placeholder = "Type English meaning...";
        }

        const tips = {
            money: "Use Il, I, Sam for Money, Phone, Date.",
            counting: "Use Hana, Dul, Set for Items, People, Age.",
            clock: "Hour is Native (Han, Du), Minute is Sino (Il, I).",
            shopping: "Essential phrases for survival!"
        };
        hint.innerText = "💡 Tip: " + tips[currentCat];

        document.getElementById('quiz-status').innerText = `Question ${currentIndex + 1} / ${allData[currentCat].length}`;
        input.value = "";
        input.focus();
        document.getElementById('message').innerText = "";
        document.getElementById('message').className = "";
    }

    // ✅ 수정된 checkAnswer: 모든 공백을 제거하고 비교합니다.
    function checkAnswer() {
        const inputRaw = document.getElementById('answer-input').value;
        // 입력값에서 모든 공백 제거 및 소문자 변환
        const inputClean = inputRaw.replace(/\s+/g, '').trim().toLowerCase();
        
        const data = allData[currentCat][currentIndex];
        const msg = document.getElementById('message');
        
        let isCorrect = false;
        let answerText = "";

        if(currentMode === 'EN_TO_KR') {
            const korAnswers = Array.isArray(data.kr) ? data.kr : [data.kr];
            // 정답 데이터에서도 공백을 제거하고 비교
            isCorrect = korAnswers.some(ans => ans.replace(/\s+/g, '') === inputClean);
            answerText = korAnswers.join(", ");
        } else {
            const engAnswers = Array.isArray(data.en) ? data.en : [data.en];
            // 영어도 공백 제거 및 소문자 변환 후 비교
            isCorrect = engAnswers.some(ans => ans.replace(/\s+/g, '').toLowerCase() === inputClean);
            answerText = engAnswers.join(", ");
        }
        
        if(isCorrect) {
            msg.innerText = "Correct! ✨ Excellent.";
            msg.className = "correct";
        } else {
            msg.innerText = `Wrong. Answer: ${answerText}`;
            msg.className = "wrong";
        }
    }

    function changeCategory(cat) {
        currentCat = cat; currentIndex = 0;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        displayWord();
    }

    function setMode(mode) { 
        currentMode = mode; 
        document.getElementById('m-en-kr').classList.toggle('active', mode === 'EN_TO_KR');
        document.getElementById('m-kr-en').classList.toggle('active', mode === 'KR_TO_EN');
        displayWord(); 
    }

    function nextWord() { currentIndex = (currentIndex + 1) % allData[currentCat].length; displayWord(); }
    function prevWord() { currentIndex = (currentIndex - 1 + allData[currentCat].length) % allData[currentCat].length; displayWord(); }
    document.getElementById('answer-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') checkAnswer(); });

    displayWord();
</script>
</body>
</html>
